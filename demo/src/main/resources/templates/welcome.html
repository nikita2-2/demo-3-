<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Добро пожаловать</title>
  <style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 20px;
    }

    .container {
        max-width: 800px;
        width: 100%;
    }

    .welcome-card {
        background: rgba(255, 255, 255, 0.95);
        border-radius: 20px;
        padding: 40px;
        box-shadow: 0 30px 60px rgba(0, 0, 0, 0.3);
        backdrop-filter: blur(10px);
        animation: fadeIn 1s ease-in;
    }

    @keyframes fadeIn {
        from {
            opacity: 0;
            transform: translateY(-20px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    .header {
        text-align: center;
        margin-bottom: 30px;
    }

    h1 {
        color: #333;
        font-size: 2.5em;
        margin-bottom: 10px;
    }

    .subtitle {
        color: #666;
        font-size: 1.2em;
    }

    .greeting-box {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        padding: 30px;
        border-radius: 15px;
        margin: 30px 0;
        text-align: center;
        box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
    }

    .greeting-box h2 {
        font-size: 2em;
        margin-bottom: 15px;
    }

    .greeting-box p {
        font-size: 1.2em;
        opacity: 0.9;
    }

    .info-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 20px;
        margin-top: 30px;
    }

    .info-card {
        background: #f8f9fa;
        padding: 20px;
        border-radius: 12px;
        text-align: center;
        transition: transform 0.3s ease;
    }

    .info-card:hover {
        transform: translateY(-5px);
        box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
    }

    .info-card .label {
        color: #667eea;
        font-weight: bold;
        margin-bottom: 10px;
        font-size: 1.1em;
    }

    .info-card .value {
        color: #333;
        font-size: 1.3em;
        font-weight: 500;
    }

    .time-display {
        background: #333;
        color: #fff;
        padding: 15px;
        border-radius: 10px;
        text-align: center;
        margin: 20px 0;
        font-size: 1.3em;
        letter-spacing: 2px;
    }

    .footer {
        text-align: center;
        margin-top: 40px;
        padding-top: 20px;
        border-top: 2px solid #eee;
        color: #999;
    }

    .button {
        display: inline-block;
        padding: 12px 30px;
        background: #667eea;
        color: white;
        text-decoration: none;
        border-radius: 25px;
        margin-top: 20px;
        transition: background 0.3s ease;
        border: none;
        cursor: pointer;
        font-size: 1em;
    }

    .button:hover {
        background: #764ba2;
    }
  </style>
</head>
<body>
<div class="container">
  <div class="welcome-card">
    <div class="header">
      <h1>🎉 Добро пожаловать! 🎉</h1>
      <div class="subtitle">в наше Spring Boot приложение</div>
    </div>

    <div class="greeting-box">
      <h2>Привет, <span th:text="${name}">Гость</span>!</h2>
      <p>Мы рады видеть вас здесь</p>
    </div>

    <div class="time-display">
      ⏰ Текущее время: <span th:text="${time}">01.01.2024 12:00:00</span>
    </div>

    <div class="info-grid">
      <div class="info-card">
        <div class="label">📅 День недели</div>
        <div class="value" th:text="${dayOfWeek}">Понедельник</div>
      </div>

      <div class="info-card">
        <div class="label">🌡️ Температура</div>
        <div class="value">22°C</div>
      </div>

      <div class="info-card">
        <div class="label">💻 Сервер</div>
        <div class="value">Spring Boot</div>
      </div>
    </div>

    <div style="text-align: center;">
      <button class="button" onclick="alert('Спасибо за визит! 👋')">
        Нажми меня!
      </button>
    </div>

    <div class="footer">
      <p>Создано с ❤️ с использованием Spring Boot</p>
      <p th:text="'Версия Java: ' + ${#executionInfo?.getProperty('java.version') ?: '17+'}">Java 17</p>
    </div>
  </div>
</div>
</body>
</html>
